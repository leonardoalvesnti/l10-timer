<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>L10 Meeting Timer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --primary: #00314A;
      --primary-light: #004466;
      --primary-dark: #001E2E;
      --accent1: #5FB246;
      --accent1-dark: #4A9038;
      --accent2: #F58220;
      --accent2-dark: #D96E10;
      --text: #E8EDF2;
      --text-muted: #8FA3B8;
      --bg1: #001520;
      --bg2: #001E2E;
      --bg3: #001A2A;
      --card1: rgba(0,49,74,0.25);
      --card2: rgba(0,30,46,0.35);
      --timer1: rgba(0,49,74,0.5);
      --timer2: rgba(0,30,46,0.6);
      --editor-bg: rgba(0,30,46,0.6);
      --editor-color: #c0d8e8;
      --timer-top: #ffffff;
      --timer-bot: #c0d8e8;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(160deg, var(--bg1) 0%, var(--bg2) 40%, var(--bg3) 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background 0.5s ease;
    }

    .wrap {
      width: 1060px;
      max-width: 100%;
      background: linear-gradient(180deg, var(--card1), var(--card2));
      border: 1px solid rgba(255,255,255,0.06);
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      transition: background 0.5s ease;
    }

    /* ── BRAND SWITCHER ── */
    .brand-switcher {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      padding: 6px;
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      width: fit-content;
    }
    .brand-btn {
      padding: 8px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      background: transparent;
      color: var(--text-muted);
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .brand-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); transform: none; }
    .brand-btn.active {
      background: rgba(255,255,255,0.1);
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .brand-btn .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .logo-img {
      height: 44px;
      width: auto;
      max-width: 180px;
      object-fit: contain;
      transition: opacity 0.3s ease;
    }
    .header-text h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .header-text .subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ── CONTROLS ── */
    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      align-items: center;
    }

    button {
      font-family: inherit;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.15s ease;
    }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent1), var(--accent1-dark));
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .btn-primary:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.3); }

    .btn-accent {
      background: linear-gradient(135deg, var(--accent2), var(--accent2-dark));
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .btn-accent:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.3); }

    .btn-ghost {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-muted);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.08); color: var(--text); }

    .preset-badge {
      margin-left: auto;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--accent2);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      transition: color 0.3s;
    }

    /* ── LAYOUT ── */
    .main { display: flex; gap: 20px; }
    .left { flex: 1; min-width: 300px; }
    .right { width: 360px; max-width: 42%; }

    @media (max-width: 768px) {
      .main { flex-direction: column; }
      .right { width: 100%; max-width: 100%; }
      .brand-switcher { width: 100%; justify-content: center; }
    }

    /* ── TIMER ── */
    .big-timer {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 28px 20px;
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--timer1), var(--timer2));
      border: 1px solid rgba(255,255,255,0.05);
      position: relative;
      overflow: hidden;
      transition: background 0.5s ease;
    }
    .big-timer::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      opacity: 0.6;
    }

    .seg-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent2);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 8px;
      transition: color 0.3s;
    }

    .time-large {
      font-size: 64px;
      font-weight: 800;
      letter-spacing: 2px;
      background: linear-gradient(180deg, var(--timer-top), var(--timer-bot));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .time-large.warning {
      background: linear-gradient(180deg, var(--accent2), var(--accent2-dark));
      -webkit-background-clip: text;
      background-clip: text;
    }
    .time-large.danger {
      background: linear-gradient(180deg, #ff4444, #cc2222);
      -webkit-background-clip: text;
      background-clip: text;
      animation: pulse-danger 1s ease-in-out infinite;
    }
    @keyframes pulse-danger {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .agenda-flow {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 12px;
      text-align: center;
      line-height: 1.6;
    }
    .agenda-flow .active-seg { color: var(--accent1); font-weight: 700; }

    .progress {
      height: 6px;
      background: rgba(255,255,255,0.04);
      border-radius: 999px;
      margin-top: 16px;
      overflow: hidden;
      width: 100%;
    }
    .progress > i {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      width: 0%;
      transition: width 0.8s ease;
      border-radius: 999px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-top: 16px;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      height: 120px;
      background: var(--editor-bg);
      color: var(--editor-color);
      border-radius: 8px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      resize: vertical;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 12px;
      line-height: 1.5;
      transition: border-color 0.2s, background 0.5s;
    }
    textarea:focus {
      outline: none;
      border-color: rgba(95,178,70,0.4);
      box-shadow: 0 0 0 3px rgba(95,178,70,0.1);
    }

    .editor-controls {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .quick-controls {
      display: flex;
      gap: 6px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    label.toggle {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
    }
    label.toggle input[type="checkbox"] { accent-color: var(--accent1); }

    /* ── SEGMENTS ── */
    .segment-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 420px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .segment-list::-webkit-scrollbar { width: 4px; }
    .segment-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    .segment {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-radius: 10px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.03);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .segment:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.06); }
    .segment.current {
      background: color-mix(in srgb, var(--accent1) 10%, transparent);
      border-color: color-mix(in srgb, var(--accent1) 20%, transparent);
      box-shadow: 0 4px 16px color-mix(in srgb, var(--accent1) 10%, transparent);
    }
    .segment.done { opacity: 0.45; }
    .segment.done .seg-name { text-decoration: line-through; }

    .seg-index {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      margin-right: 10px;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .segment.current .seg-index {
      background: var(--accent1);
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .segment.done .seg-index {
      background: color-mix(in srgb, var(--accent1) 15%, transparent);
      color: var(--accent1);
    }

    .seg-info { flex: 1; }
    .seg-name { font-weight: 600; font-size: 13px; }
    .seg-duration { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .seg-time-right { font-size: 14px; font-weight: 700; color: var(--text-muted); font-variant-numeric: tabular-nums; }
    .segment.current .seg-time-right { color: var(--accent1); }

    .summary-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      align-items: center;
    }
    .summary-bar .label { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

    .footer {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    .footer-stat { font-size: 12px; color: var(--text-muted); }
    .footer-stat strong { color: var(--text); font-weight: 600; }

    .kbd-hints { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
    .kbd-hint { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
    kbd {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 10px;
      font-family: inherit;
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="wrap" role="application" aria-label="L10 Timer">

    <!-- BRAND SWITCHER -->
    <div class="brand-switcher">
      <button class="brand-btn active" data-brand="gcs"><span class="dot" style="background:#F58220"></span> GCS Agro</button>
      <button class="brand-btn" data-brand="latitude"><span class="dot" style="background:#00BB31"></span> Latitude</button>
      <button class="brand-btn" data-brand="celeiro"><span class="dot" style="background:#8cc249"></span> Celeiro</button>
    </div>

    <!-- HEADER -->
    <div class="header">
      <img class="logo-img" id="logoImg" src="" alt="Logo" />
      <div class="header-text">
        <h1>Temporizador L10 (EOS)</h1>
        <div class="subtitle" id="brandSubtitle">GCS Agro &mdash; Reuni&atilde;o de Lideran&ccedil;a</div>
      </div>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
      <button id="startBtn" class="btn-primary">&#9654; Iniciar</button>
      <button id="pauseBtn" class="btn-ghost" style="display:none">&#10074;&#10074; Pausar</button>
      <button id="nextBtn" class="btn-ghost">&#9193; Pr&oacute;ximo</button>
      <button id="resetBtn" class="btn-ghost">&#8635; Reset</button>
      <div class="preset-badge" id="presetBadge">L10 GCS &bull; 90 min</div>
    </div>

    <!-- MAIN -->
    <div class="main">
      <div class="left">
        <div class="big-timer">
          <div class="seg-label" id="currentSegLabel">Pronto para iniciar</div>
          <div class="time-large" id="timeDisplay">90:00</div>
          <div class="agenda-flow" id="segmentDisplay"></div>
          <div class="progress" aria-hidden="true"><i id="progressBar"></i></div>
        </div>

        <div class="section-label">Editar agenda (JSON)</div>
        <textarea id="agendaEditor"></textarea>

        <div class="editor-controls">
          <button id="applyAgenda" class="btn-ghost">Aplicar</button>
          <button id="loadDefault" class="btn-ghost">Padr&atilde;o L10</button>
          <div style="flex:1"></div>
          <label class="toggle"><input type="checkbox" id="autoAdvance" checked/> Auto-avan&ccedil;o</label>
          <label class="toggle" style="margin-left:10px"><input type="checkbox" id="soundOn" checked/> Som</label>
        </div>

        <div class="section-label">Controles r&aacute;pidos</div>
        <div class="quick-controls">
          <button id="add30" class="btn-ghost">+30s</button>
          <button id="sub30" class="btn-ghost">-30s</button>
          <button id="add2min" class="btn-ghost">+2min</button>
          <button id="markDone" class="btn-accent">&#10003; Conclu&iacute;do</button>
        </div>

        <div class="kbd-hints">
          <div class="kbd-hint"><kbd>Espa&ccedil;o</kbd> Play/Pause</div>
          <div class="kbd-hint"><kbd>N</kbd> Pr&oacute;ximo</div>
          <div class="kbd-hint"><kbd>R</kbd> Reset</div>
        </div>
      </div>

      <div class="right">
        <div class="summary-bar">
          <div class="label">Segmentos da Agenda</div>
          <div class="label" id="summary" style="color:var(--accent2)">6 itens &bull; 90 min</div>
        </div>

        <div class="segment-list" id="segmentList" aria-live="polite"></div>

        <div class="footer">
          <div class="footer-stat">Decorrido: <strong id="elapsed">00:00</strong></div>
          <div class="footer-stat">Segmento: <strong id="curIdx">&mdash;</strong></div>
          <div class="footer-stat">Restante: <strong id="remainingTotal">90:00</strong></div>
        </div>
      </div>
    </div>
  </div>

  let currentBrand = 'gcs';

  function applyBrand(key) {
    const brand = BRANDS[key];
    if (!brand) return;
    currentBrand = key;

    // Apply CSS variables
    const root = document.documentElement;
    Object.entries(brand.vars).forEach(([prop, val]) => root.style.setProperty(prop, val));

    // Update logo
    document.getElementById('logoImg').src = brand.logo;

    // Update texts
    document.getElementById('brandSubtitle').textContent = brand.subtitle;
    document.getElementById('presetBadge').innerHTML = brand.badge + ' \u2022 90 min';
    document.title = 'L10 Timer — ' + brand.name;

    // Update active button
    document.querySelectorAll('.brand-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.brand === key);
    });
  }

  // Brand button handlers
  document.querySelectorAll('.brand-btn').forEach(btn => {
    btn.addEventListener('click', () => applyBrand(btn.dataset.brand));
  });

  let audioCtx = null;
  function playBeep() {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.6);
    } catch(e) {}
  }

    {name:"Rocks", minutes:10},
    {name:"TO-DOS", minutes:5},
    {name:"IDS (Identify, Discuss, Solve)", minutes:50},
    {name:"Conclus\u00e3o", minutes:5}
  ];

  const $ = id => document.getElementById(id);
  const startBtn = $('startBtn');
  const pauseBtn = $('pauseBtn');
  const nextBtn = $('nextBtn');
  const resetBtn = $('resetBtn');
  const timeDisplay = $('timeDisplay');
  const segmentDisplay = $('segmentDisplay');
  const segmentList = $('segmentList');
  const agendaEditor = $('agendaEditor');
  const progressBar = $('progressBar');
  const elapsedEl = $('elapsed');
  const summaryEl = $('summary');
  const curIdxEl = $('curIdx');
  const currentSegLabel = $('currentSegLabel');
  const remainingTotalEl = $('remainingTotal');

  function fmt(s) {
    const m = Math.floor(s / 60);
    const ss = s % 60;
    return String(m).padStart(2,'0') + ':' + String(ss).padStart(2,'0');
  }

  function getElapsed() {
    return segments.reduce((a, s) => a + s.minutes * 60, 0) - getRemainingTotal();
  }

  function getRemainingTotal() {
    let rem = 0;
    for (let i = cur; i < segments.length; i++)
      rem += (i === cur ? remaining : segments[i].minutes * 60);
    return rem;
  }

  function getProgressPercent() {
    const total = segments.reduce((a, s) => a + s.minutes * 60, 0);
    return Math.min(100, Math.round((getElapsed() / Math.max(1, total)) * 100));
  }

  function rebuildList() {
    segmentList.innerHTML = '';
    segments.forEach((seg, i) => {
      const el = document.createElement('div');
      const isDone = i < cur;
      el.className = 'segment' + (i === cur ? ' current' : '') + (isDone ? ' done' : '');
      el.tabIndex = 0;
      const timeStr = (i === cur) ? fmt(remaining) : fmt(seg.minutes * 60);
      el.innerHTML =
        '<div class="seg-index">' + (isDone ? '\u2713' : i + 1) + '</div>' +
        '<div class="seg-info"><div class="seg-name">' + seg.name + '</div>' +
        '<div class="seg-duration">' + seg.minutes + ' min</div></div>' +
        '<div class="seg-time-right">' + timeStr + '</div>';
      el.addEventListener('click', () => jumpTo(i));
      segmentList.appendChild(el);
    });
    const c = segmentList.querySelector('.segment.current');
    if (c) c.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  function updateUI() {
    timeDisplay.textContent = fmt(remaining);
    const segTotal = segments[cur] ? segments[cur].minutes * 60 : 1;
    const pct = remaining / segTotal;
    timeDisplay.className = 'time-large';
    if (pct <= 0.1 && remaining > 0) timeDisplay.classList.add('danger');
    else if (pct <= 0.25) timeDisplay.classList.add('warning');

    currentSegLabel.textContent = segments[cur] ? segments[cur].name : 'Reunião finalizada';

    segmentDisplay.innerHTML = segments.map((s, i) => {
      if (i === cur) return '<span class="active-seg">\u25b6 ' + s.name + '</span>';
      if (i < cur) return '<s style="opacity:0.4">' + s.name + '</s>';
      return s.name;
    }).join(' \u2192 ');

    progressBar.style.width = getProgressPercent() + '%';
    elapsedEl.textContent = fmt(getElapsed());
    curIdxEl.textContent = segments[cur] ? (cur + 1) + '/' + segments.length : '\u2014';
    remainingTotalEl.textContent = fmt(getRemainingTotal());

    const totalMin = Math.floor(segments.reduce((a, s) => a + s.minutes * 60, 0) / 60);
    summaryEl.innerHTML = segments.length + ' itens \u2022 ' + totalMin + ' min';

    startBtn.style.display = running ? 'none' : '';
    pauseBtn.style.display = running ? '' : 'none';
    rebuildList();
  }

  function loadAgenda(arr) {
    segments = arr.map(x => ({ name: x.name, minutes: Number(x.minutes) }));
    cur = 0;
    remaining = segments.length ? segments[0].minutes * 60 : 0;
    updateUI();
  }

  function tick() {
    if (!running) return;
    if (remaining > 0) { remaining--; }
    else {
      signal();
      if (autoAdvance.checked) nextSegment();
      else { running = false; clearInterval(intervalId); }
    }
    updateUI();
  }

  function start() {
    if (!segments.length || running) return;
    running = true;
    intervalId = setInterval(tick, 1000);
    updateUI();
  }

  function pause() { running = false; clearInterval(intervalId); updateUI(); }

  function reset() { pause(); loadAgenda(segments.map(s => ({ name: s.name, minutes: s.minutes }))); }

  function nextSegment() {
    if (cur < segments.length - 1) { cur++; remaining = segments[cur].minutes * 60; updateUI(); }
    else {
      // LOOP: reinicia a agenda do início
      signal();
      cur = 0;
      remaining = segments[0].minutes * 60;
      updateUI();
    }
  }

  function jumpTo(i) { pause(); cur = i; remaining = segments[cur].minutes * 60; updateUI(); }

  function addTime(sec) { remaining = Math.max(0, remaining + sec); updateUI(); }

  function markDone() { remaining = 0; updateUI(); if (autoAdvance.checked) nextSegment(); }

  function signal() {
    if (soundOn.checked) {
      playBeep();
      const prev = document.title;
      let n = 0;
      const f = setInterval(() => {
        document.title = (n % 2 ? '\u23f0 Segmento finalizado!' : prev);
        if (++n > 6) { clearInterval(f); document.title = prev; }
      }, 400);
    }
  }

  // ══════════════════════════════════════
  //  EVENT LISTENERS
  // ══════════════════════════════════════
  startBtn.addEventListener('click', start);
  pauseBtn.addEventListener('click', () => { if (running) pause(); else start(); });
  nextBtn.addEventListener('click', nextSegment);
  resetBtn.addEventListener('click', reset);
  $('add30').addEventListener('click', () => addTime(30));
  $('sub30').addEventListener('click', () => addTime(-30));
  $('add2min').addEventListener('click', () => addTime(120));
  $('markDone').addEventListener('click', markDone);

  $('applyAgenda').addEventListener('click', () => {
    try {
      const parsed = JSON.parse(agendaEditor.value);
      if (!Array.isArray(parsed)) throw new Error('precisa ser array');
      parsed.forEach(it => { if (!it.name || isNaN(Number(it.minutes))) throw new Error('name + minutes'); });
      loadAgenda(parsed);
    } catch (e) { alert('JSON inválido: ' + e.message); }
  });

  $('loadDefault').addEventListener('click', () => {
    agendaEditor.value = JSON.stringify(defaultAgenda, null, 2);
    loadAgenda(defaultAgenda);
  });

  window.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
    if (e.key === ' ') { e.preventDefault(); if (running) pause(); else start(); }
    if (e.key === 'n' || e.key === 'N') nextSegment();
    if (e.key === 'r' || e.key === 'R') reset();
  });

  // ══════════════════════════════════════
  //  INIT
  // ══════════════════════════════════════
  agendaEditor.value = JSON.stringify(defaultAgenda, null, 2);
  loadAgenda(defaultAgenda);
  applyBrand('gcs');
})();
</script>
</body>
</html>
